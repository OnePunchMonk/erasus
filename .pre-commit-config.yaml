repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [torch, numpy]
        args: [--ignore-missing-imports, --no-strict-optional]
        pass_filenames: false
        entry: mypy erasus/core/ erasus/utils/batch.py

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]

  # Minimal smoke: root public API + stability metadata (fast; no downloads).
  - repo: local
    hooks:
      - id: pytest-public-api
        name: pytest (public API smoke)
        language: system
        entry: python3 -m pytest tests/unit/test_public_api.py -q
        pass_filenames: false
        always_run: true
